<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Romasha 桌面视窗</title>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>
    <style>
        
        :root {
            --main-font-size: 16px; 
            --sub-font-size: 14px;
        }

        body { margin: 0; padding: 0; overflow: hidden; background-color: transparent; }
        canvas { display: block; }

        
        #chat-bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid #ffb6c1;
            border-radius: 15px;
            
            padding: 0;
            box-sizing: border-box;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.15);
            transition: opacity 0.3s;
            opacity: 0;
            z-index: 100;
            transform: translate(-50%, -100%); 
        }

        
        .scroll-wrapper {
            padding: 12px 18px;
            
            max-width: 350px;
            width: max-content;
            max-height: 150px;
            overflow-y: auto;
            word-wrap: break-word;
            line-height: 1.5;
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: var(--main-font-size); 
            color: #333;
        }

        
        .scroll-wrapper::-webkit-scrollbar { width: 6px; }
        .scroll-wrapper::-webkit-scrollbar-track { background: transparent; }
        .scroll-wrapper::-webkit-scrollbar-thumb { background: #ffb6c1; border-radius: 3px; }

        #chat-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            margin-left: -10px;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.95) transparent transparent transparent;
        }

        
        #input-container {
            position: absolute;
            transform: translate(-50%, 0);
            z-index: 100;
            transition: opacity 0.3s;
            opacity: 0;
            pointer-events: none;
        }
        #input-container.active {
            opacity: 1;
            pointer-events: auto;
        }
        #chat-input {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px; 
            padding: 10px 20px;
            color: white;
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: 16px;
            outline: none;
            width: 300px;
            backdrop-filter: blur(5px);

            
            resize: none;          
            overflow-y: hidden;    
            box-sizing: border-box;
            min-height: 44px;      
            max-height: 120px;     
            line-height: 20px;     
            display: block;
        }
        #chat-input::placeholder { color: rgba(255, 255, 255, 0.6); }
        #light-hint {
            position: absolute;
            transform: translate(-50%, -100%);
            background: rgba(255, 255, 255, 0.78);
            color: #777;
            border-radius: 12px;
            padding: 6px 12px;
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: var(--sub-font-size);
            line-height: 1.4;
            white-space: nowrap;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.10);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 110;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="chat-bubble"></div>
    <div id="light-hint"></div>
    <div id="input-container">
        <textarea id="chat-input" placeholder="对她说点什么..." autocomplete="off" rows="1"></textarea>
    </div>

    <audio id="romasha-audio" style="display:none;"></audio>
    <canvas id="canvas"></canvas>

    <script>
        const chatBubble = document.getElementById('chat-bubble');
        const inputContainer = document.getElementById('input-container');
        const chatInput = document.getElementById('chat-input');
        const lightHint = document.getElementById('light-hint');
        let lightHintTimeout = null;

        function reportLoadError(msg) {
            console.error(msg);
            if (chatBubble) {
                chatBubble.innerHTML = `<div class="scroll-wrapper" style="color:#e74c3c;">${msg}</div>`;
                chatBubble.style.left = '50%';
                chatBubble.style.top = '120px';
                chatBubble.style.opacity = 1;
            }
            document.title = "EVENT:LOAD_ERROR:" + encodeURIComponent(msg);
        }
        if (typeof PIXI === 'undefined') {
            reportLoadError("前端依赖加载失败：PIXI 未成功加载，请检查网络或 CDN。");
            throw new Error("PIXI 未定义");
        }
        if (!PIXI.live2d || !PIXI.live2d.Live2DModel) {
            reportLoadError("前端依赖加载失败：pixi-live2d-display 未成功加载，请检查网络或 CDN。");
            throw new Error("PIXI.live2d 未定义");
        }
        if (typeof Live2DCubismCore === 'undefined') {
            reportLoadError("前端依赖加载失败：Live2D Cubism Core 未成功加载，请检查网络或 CDN。");
            throw new Error("Live2DCubismCore 未定义");
        }

        const app = new PIXI.Application({
            view: document.getElementById('canvas'),
            autoStart: true,
            resizeTo: window,
            transparent: true,
            backgroundAlpha: 0
        });

        let trackingEnabled = true;
        window.bubbleTimeout = null;

        
        
        
        
        
        
        
        
        
        
        
        
        
        
        
        
        
        
        
        
        
        
        
        
        
        
        
        let bubbleManualKeepAlive = false;
        let bubbleAudioPlaying = false;
        let bubbleLastHtml = "";
        let bubbleLastDisplayTime = 0;

        
        
        let isDragging = false;

        
        
        
        
        
        
        
        
        
        const LOOK_TRACK_CONFIG = {
            
            HEAD_ANCHOR_X_RATIO: 0.45, 
            HEAD_ANCHOR_Y_RATIO: 0.27, 

            
            OFFSET_BLEND_X: 1.0,
            OFFSET_BLEND_Y: 1.0,

            
            SMOOTHING: 0.28,

            
            MAX_OFFSET_X_RATIO: 0.35,
            MAX_OFFSET_Y_RATIO: 0.28
        };

        
        let latestGlobalMouse = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2
        };

        
        let smoothedLookTarget = null;

        





        function getModelBoundsSafe() {
            if (!window.romashaModel) return null;
            return window.romashaModel.getBounds();
        }

        




        function getHeadAnchor(bounds) {
            return {
                x: bounds.x + bounds.width * LOOK_TRACK_CONFIG.HEAD_ANCHOR_X_RATIO,
                y: bounds.y + bounds.height * LOOK_TRACK_CONFIG.HEAD_ANCHOR_Y_RATIO
            };
        }

        














        function getCorrectedLookTarget(mouseX, mouseY) {
            const bounds = getModelBoundsSafe();
            if (!bounds) {
                return { x: mouseX, y: mouseY };
            }

            const modelCenterX = bounds.x + bounds.width / 2;
            const modelCenterY = bounds.y + bounds.height / 2;

            const headAnchor = getHeadAnchor(bounds);

            
            const offsetX = (modelCenterX - headAnchor.x) * LOOK_TRACK_CONFIG.OFFSET_BLEND_X;
            const offsetY = (modelCenterY - headAnchor.y) * LOOK_TRACK_CONFIG.OFFSET_BLEND_Y;

            let correctedX = mouseX + offsetX;
            let correctedY = mouseY + offsetY;

            
            let dx = correctedX - modelCenterX;
            let dy = correctedY - modelCenterY;

            const maxOffsetX = bounds.width * LOOK_TRACK_CONFIG.MAX_OFFSET_X_RATIO;
            const maxOffsetY = bounds.height * LOOK_TRACK_CONFIG.MAX_OFFSET_Y_RATIO;

            dx = Math.max(-maxOffsetX, Math.min(maxOffsetX, dx));
            dy = Math.max(-maxOffsetY, Math.min(maxOffsetY, dy));

            correctedX = modelCenterX + dx;
            correctedY = modelCenterY + dy;

            return {
                x: correctedX,
                y: correctedY
            };
        }

        





        function updateLookTrackingFrame() {
            if (!trackingEnabled || isDragging || !window.romashaModel) return;

            const corrected = getCorrectedLookTarget(latestGlobalMouse.x, latestGlobalMouse.y);

            if (!smoothedLookTarget) {
                smoothedLookTarget = { x: corrected.x, y: corrected.y };
            } else {
                smoothedLookTarget.x += (corrected.x - smoothedLookTarget.x) * LOOK_TRACK_CONFIG.SMOOTHING;
                smoothedLookTarget.y += (corrected.y - smoothedLookTarget.y) * LOOK_TRACK_CONFIG.SMOOTHING;
            }

            window.romashaModel.focus(smoothedLookTarget.x, smoothedLookTarget.y);
        }

        
        let touchEnabled = true;      
        let touchBusyLocked = false;  
        let lastTouchBusyHintTime = 0; 

        
        window.setBubbleSize = function(size) {
            let root = document.documentElement;
            if (size === 0) { 
                root.style.setProperty('--main-font-size', '14px');
                root.style.setProperty('--sub-font-size', '12px');
            } else if (size === 1) { 
                root.style.setProperty('--main-font-size', '16px');
                root.style.setProperty('--sub-font-size', '14px');
            } else if (size === 2) { 
                root.style.setProperty('--main-font-size', '18px');
                root.style.setProperty('--sub-font-size', '16px');
            }
        };

        PIXI.live2d.Live2DModel.from('model/romasha_talk.model3.json').then(model => {
            app.stage.addChild(model);
            window.romashaModel = model;

            
            model.scale.set(0.5);
            model.y = 200; 
            model.x = window.innerWidth / 2 - model.width / 2;

            model.autoInteract = false;
            model.interactive = true;
            model.buttonMode = true;

            
            let currentMouthOpen = 0;

            app.ticker.add(() => {
                let bounds = window.romashaModel.getBounds();
                let centerX = bounds.x + bounds.width / 2;

                
                
                
                
                
                updateLookTrackingFrame();

                
                let targetBubbleY = bounds.y + 30;
                if (targetBubbleY - chatBubble.offsetHeight < 10) targetBubbleY = chatBubble.offsetHeight + 10;
                chatBubble.style.left = centerX + 'px';
                chatBubble.style.top = targetBubbleY + 'px';

                let hintY = targetBubbleY - chatBubble.offsetHeight - 10;
                if (hintY < 10) hintY = 10;
                lightHint.style.left = centerX + 'px';
                lightHint.style.top = hintY + 'px';

                
                if (analyser && dataArray && window.romashaModel && !audioElement.paused) {
                    
                    analyser.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i = 0; i < dataArray.length; i++) {
                        sum += dataArray[i];
                    }
                    
                    let average = sum / dataArray.length;

                    
                    
                    let targetMouthOpen = average / 80.0;
                    if (targetMouthOpen > 1.0) targetMouthOpen = 1.0;
                    if (targetMouthOpen < 0.05) targetMouthOpen = 0.0; 

                    
                    currentMouthOpen = currentMouthOpen + (targetMouthOpen - currentMouthOpen) * 0.3;

                    
                    
                    window.romashaModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', currentMouthOpen);
                } else {
                    
                    currentMouthOpen = currentMouthOpen + (0 - currentMouthOpen) * 0.2;
                    if (currentMouthOpen > 0.01 && window.romashaModel) {
                        window.romashaModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', currentMouthOpen);
                    }
                }

                
                
                let bootOffset = bounds.height * 0.45;
                let targetInputY = bounds.y + bounds.height + bootOffset + 15;

                
                if (targetInputY > window.innerHeight - 50) targetInputY = window.innerHeight - 50;

                inputContainer.style.left = centerX + 'px';
                inputContainer.style.top = targetInputY + 'px';
            });

            
            
            
            
            
            
            
            
            window.updateGlobalMouse = function(x, y) {
                latestGlobalMouse.x = x;
                latestGlobalMouse.y = y;
            };

            window.toggleTracking = function(state) {
                trackingEnabled = state;
                if (!state) {
                    
                    smoothedLookTarget = null;

                    
                    if (model.internalModel && model.internalModel.focusController) {
                        model.internalModel.focusController.focus(0, 0);
                    }
                }
            };

            
            window.toggleTouch = function(state) {
                touchEnabled = state;
            };

            window.toggleTouchBusy = function(state) {
                touchBusyLocked = state;
            };

            function canTouchNow() {
                return touchEnabled && !touchBusyLocked;
            }

            
            window.applySavedState = function(scale, x, y, track, touch) {
                if (window.romashaModel) {
                    window.romashaModel.scale.set(scale);
                    
                    if (x === -1) {
                        window.romashaModel.x = window.innerWidth / 2 - window.romashaModel.width / 2;
                    } else {
                        window.romashaModel.x = x;
                    }
                    window.romashaModel.y = y;

                    trackingEnabled = track;
                    touchEnabled = touch;
                }
            };

            
            
            const audioElement = document.getElementById('romasha-audio');
            let audioCtx = null;
            let analyser = null;
            let dataArray = null;

            
            window.playRomashaVoice = function(audioBase64) {
                try {
                    if (!audioCtx) {
                        
                        
                        
                        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        analyser = audioCtx.createAnalyser();
                        analyser.fftSize = 256;

                        let source = audioCtx.createMediaElementSource(audioElement);
                        source.connect(analyser);
                        analyser.connect(audioCtx.destination);

                        dataArray = new Uint8Array(analyser.frequencyBinCount);
                    }

                    
                    
                    
                    
                    
                    
                    clearBubbleHideTimer();
                    bubbleAudioPlaying = false;

                    
                    audioElement.src = "data:audio/wav;base64," + audioBase64;
                    
                    bubbleAudioPlaying = true;
                    updateBubbleVisibility(false);

                    
                    
                    
                    
                    
                    
                    audioElement.onplay = function() {
                        bubbleAudioPlaying = true;
                        updateBubbleVisibility(false);
                    };

                    
                    
                    
                    
                    
                    
                    
                    
                    
                    
                    audioElement.onended = function() {
                        bubbleAudioPlaying = false;

                        
                        setTimeout(() => {
                            updateBubbleVisibility(true);
                        }, 250);

                        
                        document.title = "EVENT:AUDIO_END";
                    };

                    
                    
                    
                    
                    
                    audioElement.onerror = function() {
                        bubbleAudioPlaying = false;
                        updateBubbleVisibility(false);
                    };

                    
                    audioElement.play().then(() => {
                        if (audioCtx.state === 'suspended') {
                            audioCtx.resume();
                        }
                    }).catch(() => {
                        
                        bubbleAudioPlaying = false;
                        updateBubbleVisibility(false);
                    });

                } catch (e) {
                    
                    bubbleAudioPlaying = false;
                    updateBubbleVisibility(false);
                    console.log("声音传达似乎受到了阻碍...");
                }
            };

            
            
            window.stopRomashaVoice = function() {
                if (audioElement) {
                    
                    audioElement.pause();
                    audioElement.currentTime = 0;
                }

                
                
                
                
                
                bubbleAudioPlaying = false;

                
                
                
                
                updateBubbleVisibility(false);
            };

            
            model.on('rightdown', (e) => {
                inputContainer.classList.toggle('active');
                if (inputContainer.classList.contains('active')) chatInput.focus();
            });

            
            chatInput.addEventListener('input', function () {
                this.style.height = '40px'; 
                this.style.height = (this.scrollHeight) + 'px'; 

                
                if (this.scrollHeight > 120) {
                    this.style.overflowY = 'auto';
                } else {
                    this.style.overflowY = 'hidden';
                }
            });

            
            chatInput.addEventListener('keydown', function (e) {
                
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault(); 
                    if (this.value.trim() !== '') {
                        document.title = "CHAT:" + this.value.trim();
                        this.value = '';
                        inputContainer.classList.remove('active');
                        
                        this.style.height = '44px';
                        this.style.overflowY = 'hidden'; 
                    }
                }
            });

            






            function clearBubbleHideTimer() {
                if (window.bubbleTimeout) {
                    clearTimeout(window.bubbleTimeout);
                    window.bubbleTimeout = null;
                }
            }

            






















            function updateBubbleVisibility(immediate = false) {
                
                clearBubbleHideTimer();

                
                if (!bubbleLastHtml || bubbleLastHtml.trim() === "") {
                    return;
                }

                
                if (bubbleManualKeepAlive) {
                    return;
                }

                
                if (bubbleAudioPlaying) {
                    return;
                }

                
                
                
                

                if (immediate) {
                    
                    
                    
                    chatBubble.style.opacity = 0;
                } else {
                    
                    
                    const delay = Math.max(0, bubbleLastDisplayTime || 0);
                    window.bubbleTimeout = setTimeout(() => {
                        
                        if (!bubbleManualKeepAlive && !bubbleAudioPlaying) {
                            chatBubble.style.opacity = 0;
                        }
                    }, delay);
                }
            }

            
            window.showBubble = function(text, keepAlive = false) {
                
                
                
                
                
                

                
                bubbleLastHtml = text;

                
                bubbleManualKeepAlive = !!keepAlive;

                
                chatBubble.innerHTML = `<div class="scroll-wrapper">${text}</div>`;
                chatBubble.style.opacity = 1;

                
                let scrollWrapper = chatBubble.querySelector('.scroll-wrapper');
                if (scrollWrapper) {
                    scrollWrapper.scrollTop = scrollWrapper.scrollHeight;
                }

                
                
                bubbleLastDisplayTime = Math.max(
                    5500,
                    text.replace(/<[^>]+>/g, '').length * 120
                );

                
                
                
                
                updateBubbleVisibility(false);
            };

            window.showLightHint = function(text, duration = 1200) {
                if (lightHintTimeout) {
                    clearTimeout(lightHintTimeout);
                    lightHintTimeout = null;
                }

                lightHint.innerHTML = text;
                lightHint.style.opacity = 1;

                lightHintTimeout = setTimeout(() => {
                    lightHint.style.opacity = 0;
                    setTimeout(() => {
                        if (lightHint.style.opacity === '0') {
                            lightHint.innerHTML = '';
                        }
                    }, 220);
                }, duration);
            };

            
            
            let downX = 0, downY = 0;
            let startModelX = 0, startModelY = 0;
            let downTime = 0;

            model.on('pointerdown', (e) => {
                if(e.data.button === 0) {
                    downTime = Date.now();
                    downX = e.data.originalEvent.screenX;
                    downY = e.data.originalEvent.screenY;
                    startModelX = e.data.global.x;
                    startModelY = e.data.global.y;
                    isDragging = true;
                }
            });

            window.addEventListener('pointerup', (e) => {
                if(!isDragging) return;
                isDragging = false;

                
                if (!touchEnabled) return;

                
                if (touchBusyLocked) {
                    const now = Date.now();
                    if (now - lastTouchBusyHintTime > 800) { 
                        lastTouchBusyHintTime = now;
                        window.showLightHint("<i>(她还在感受你刚才的触碰...)</i>", 1200);
                    }
                    return;
                }

                let upTime = Date.now();
                let dist = Math.hypot(e.screenX - downX, e.screenY - downY);

                if(dist < 10 && (upTime - downTime) < 300) {
                    const bounds = model.getBounds();
                    const relX = (startModelX - bounds.x) / bounds.width;
                    const relY = (startModelY - bounds.y) / bounds.height;

                    
                    let bodyPart = "unknown";

                    
                    if (relY < 0.22) {
                        bodyPart = "head";        
                    } else if (relY < 0.33) {
                        bodyPart = "face";        
                    } else if (relY < 0.53 && relY > 0.43) {
                        bodyPart = "bust";        
                    } else if (relY < 0.65) {
                        bodyPart = "belly";       
                    } else if (relY < 0.78) {
                        
                        
                        if (relX > 0.52 && relX < 0.55) {
                            bodyPart = "hip";  
                        } else {
                            bodyPart = "crotch";  
                        }
                    } else {
                        bodyPart = "leg";         
                    }

                    
                    
                    if (relY > 0.69 && relY < 0.78) {
                        if (relX < 0.37) bodyPart = "hand_right"; 
                        if (relX > 0.57) bodyPart = "hand_left";  
                    }
                    
                    
                                    
                                    
                    

                    
                    document.title = "TOUCH:" + bodyPart;
                }
            });

            window.addEventListener('pointermove', (e) => {
                if (isDragging) {
                    let dx = e.screenX - downX;
                    let dy = e.screenY - downY;
                    downX = e.screenX;
                    downY = e.screenY;

                    
                    model.x += dx;
                    model.y += dy;

                    
                    
                    document.title = "DRAG_STATE:" + model.scale.x + ":" + model.x + ":" + model.y;
                }
            });

            window.addEventListener('pointercancel', () => {
                isDragging = false;
            });

            
            
            document.addEventListener('wheel', (e) => {
                if (e.target.closest('#chat-bubble')) return;

                const zoomFactor = e.deltaY > 0 ? 0.95 : 1.05;
                model.scale.x *= zoomFactor;
                model.scale.y *= zoomFactor;

                
                
                document.title = "WHEEL_STATE:" + model.scale.x + ":" + model.x + ":" + model.y;
            });

            
            
            let currentIdleIndex = 24; 
            let isActionPlaying = false;
            let idleLoopId = 0;
            let actionId = 0; 
            let motionHoldMode = 'fixed'; 
            let heldActionId = 0;
            let heldActionReady = false;

            function finishCurrentAction(expectedActionId) {
                if (expectedActionId !== actionId) return;

                isActionPlaying = false;
                heldActionId = 0;
                heldActionReady = false;

                
                if (model.internalModel && model.internalModel.coreModel) {
                    model.internalModel.coreModel.setParameterValueById('ParamCheek', 0.0);
                    model.internalModel.coreModel.setParameterValueById('angry', 0.0);
                }

                
                playCurrentIdle();
            }

            window.setMotionHoldMode = function(mode) {
                motionHoldMode = (mode === 'until_release') ? 'until_release' : 'fixed';
            };

            window.releaseRomashaMotion = function() {
                if (heldActionReady && heldActionId === actionId) {
                    finishCurrentAction(heldActionId);
                }
            };

            
            window.playRomashaMotion = function(group, index) {
                isActionPlaying = true;
                idleLoopId++; 
                let currentActionId = ++actionId; 

                
                heldActionId = 0;
                heldActionReady = false;
                
                let startTime = Date.now();

                
                if (model.internalModel && model.internalModel.motionManager) {
                    model.internalModel.motionManager.stopAllMotions();
                }

                model.motion(group, index, 3).finally(() => {
                    
                    
                    if (currentActionId !== actionId) return;
                    
                    let elapsedTime = Date.now() - startTime;
                    
                    if (motionHoldMode === 'until_release') {
                        heldActionId = currentActionId;
                        heldActionReady = true;
                        return;
                    }
                    
                    
                    let waitTime = 5500 - elapsedTime;
                    if (waitTime < 50) waitTime = 50;
                    
                    setTimeout(() => {
                        
                        if (currentActionId !== actionId) return;
                        if (motionHoldMode === 'until_release') return; 
                        finishCurrentAction(currentActionId);
                    }, waitTime);
                });
            };

            
            window.setRomashaIdleMotion = function(index) {
                currentIdleIndex = index;
                if (!isActionPlaying) {
                    idleLoopId++; 
                    
                    playCurrentIdle();
                }
            };

            
            function playCurrentIdle() {
                let currentLoopId = ++idleLoopId;
                
                model.motion('BaseMotions', currentIdleIndex, 1).finally(() => {
                    
                    if(currentLoopId === idleLoopId && !isActionPlaying) {
                        
                        setTimeout(() => {
                            playCurrentIdle();
                        }, 50);
                    }
                });
            }

            
            setTimeout(() => { playCurrentIdle(); }, 1000);


            window.setRomashaParam = function(paramId, value) { model.internalModel.coreModel.setParameterValueById(paramId, value); };

            
            window.lastMaskRects = [];
            setInterval(() => {
                let currentRects = [];

                
                if (window.romashaModel) {
                    let bounds = window.romashaModel.getBounds();
                    let centerX = bounds.x + bounds.width / 2;
                    let trimRatio = 0.45;
                    let responsiveWidth = bounds.width * trimRatio;
                    let bootOffset = bounds.height * 0.45;

                    let x = Math.floor(centerX - responsiveWidth / 2);
                    let y = Math.floor(bounds.y - 20);
                    let w = Math.ceil(responsiveWidth);
                    let h = Math.ceil(bounds.height + bootOffset + 30);
                    currentRects.push([x, y, w, h]);
                }

                
                const isBubbleVisible = chatBubble.style.opacity > 0.05 && chatBubble.innerHTML !== "" && chatBubble.offsetWidth > 0;
                if (isBubbleVisible) {
                    let rect = chatBubble.getBoundingClientRect();
                    currentRects.push([Math.floor(rect.x - 5), Math.floor(rect.y - 5), Math.ceil(rect.width + 10), Math.ceil(rect.height + 15)]);
                }

                
                const isInputActive = inputContainer.classList.contains('active') && inputContainer.offsetWidth > 0;
                if (isInputActive) {
                    let rect = inputContainer.getBoundingClientRect();
                    currentRects.push([Math.floor(rect.x - 5), Math.floor(rect.y - 5), Math.ceil(rect.width + 10), Math.ceil(rect.height + 10)]);
                }

                
                const isHintVisible = lightHint.style.opacity > 0.05 && lightHint.innerHTML !== "" && lightHint.offsetWidth > 0;
                if (isHintVisible) {
                    let rect = lightHint.getBoundingClientRect();
                    currentRects.push([Math.floor(rect.x - 4), Math.floor(rect.y - 4), Math.ceil(rect.width + 8), Math.ceil(rect.height + 8)]);
                }

                
                
                
                let isDifferent = false;
                if (currentRects.length !== window.lastMaskRects.length) {
                    isDifferent = true;
                } else {
                    for(let i=0; i<currentRects.length; i++) {
                        if (Math.abs(currentRects[i][0] - window.lastMaskRects[i][0]) > 5 ||
                            Math.abs(currentRects[i][1] - window.lastMaskRects[i][1]) > 5 ||
                            Math.abs(currentRects[i][2] - window.lastMaskRects[i][2]) > 5 ||
                            Math.abs(currentRects[i][3] - window.lastMaskRects[i][3]) > 5) {
                            isDifferent = true;
                            break;
                        }
                    }
                }

                if (isDifferent) {
                    window.lastMaskRects = currentRects;
                    let maskStr = "MASK:" + currentRects.map(r => r.join(',')).join('|');
                    document.title = maskStr;
                }
            }, 100);

            setTimeout(() => { document.title = "EVENT:READY"; }, 800);
        })
        .catch(err => {
            console.error("Live2D 模型加载失败:", err);
            const msg = "模型加载失败：" + (err && err.message ? err.message : String(err));
            chatBubble.innerHTML = `<div class="scroll-wrapper" style="color:#e74c3c;">${msg}</div>`;
            chatBubble.style.left = '50%';
            chatBubble.style.top = '120px';
            chatBubble.style.opacity = 1;
            document.title = "EVENT:LOAD_ERROR:" + encodeURIComponent(msg);
        });
    </script>
</body>
</html>
